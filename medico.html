<!DOCTYPE html> 

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VASAGIO | Colaboración Médica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="navbar">
    <div class="nav-container">

<div class="logo">
    <a href="index.html">
        <img src="assets/images/logo.png" alt="VASAGIO Logo">
    </a>
</div>

    <nav>
        <a href="index.html">Inicio</a>
    </nav>

</div>
</header>

<section class="hero">
<div class="hero-container">

    <div class="hero-content">

        <h1>Colaboración con VASAGIO</h1>

        <p class="subheadline">
        Integra tecnología protésica de alto desempeño en tu clínica sin depender de importaciones.
        </p>

        <p class="credibility">
        Buscamos médicos y clínicas para distribución, validación clínica y desarrollo conjunto.
        </p>

    </div>

    <div class="hero-visual">
        <img src="assets/renders/doctor2.png">
    </div>

</div>
</section>

<section class="lead-form">
<div class="container">

    <h2>Solicitud de colaboración</h2>

    <form id="medicoForm">

        <input name="nombre" placeholder="Nombre del doctor" required>

        <input name="clinica" placeholder="Nombre de la clínica" required>

        <input type="email" name="email" placeholder="Correo electrónico" required>

        <input name="telefono" placeholder="Teléfono (10 dígitos)" required>

        <select name="interes" required>
            <option value="">Selecciona tu interés</option>
            <option value="distribucion">Distribución</option>
            <option value="lote">Lote</option>
            <option value="alianza">Alianza</option>
        </select>

        <textarea name="mensaje" placeholder="Detalles adicionales"></textarea>

        <button type="submit" class="primary">Enviar solicitud</button>

    </form>

    <p id="msgMedico" style="margin-top:20px;"></p>

</div>
</section>

<script>

document.addEventListener("DOMContentLoaded", () => {

    console.log("Script cargado correctamente");

    const form = document.getElementById("medicoForm");
    const msg = document.getElementById("msgMedico");

    if (!form) {
        console.error("Formulario NO encontrado");
        return;
    }

    form.addEventListener("submit", async (e) => {

        e.preventDefault();

        msg.innerText = "Enviando...";

        const data = Object.fromEntries(new FormData(form).entries());

        console.log("DATOS MEDICO:", data);

        // 🔒 VALIDACIÓN TELEFONO
        if (!/^\d{10}$/.test(data.telefono || "")) {
            msg.innerText = "❌ El teléfono debe tener 10 dígitos";
            return;
        }

        // 🔒 VALIDACIÓN EXTRA (evita errores backend)
        if (!data.nombre || !data.clinica || !data.email || !data.interes) {
            msg.innerText = "❌ Completa todos los campos obligatorios";
            return;
        }

        try {

            const res = await fetch("https://vasagio-production.up.railway.app/medico", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            let result = {};

            try {
                result = await res.json();
            } catch {
                console.warn("Respuesta no es JSON");
            }

            console.log("RESPUESTA BACKEND:", result);

            if (!res.ok) {
                msg.innerText = "❌ " + (result.detail?.[0]?.msg || result.message || "Error en el servidor");
                return;
            }

            msg.innerText = "✔ Solicitud enviada correctamente";

            form.reset();

        } catch (error) {

            console.error("ERROR:", error);

            msg.innerText = "❌ Error conectando con el servidor";
        }

    });

});

</script>

</body>
</html>
